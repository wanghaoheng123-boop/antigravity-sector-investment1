name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_pull:
        description: 'Skip vercel pull (use prebuilt artifacts only)'
        required: false
        default: 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@50.37.3

      # Create .vercel/project directory so `vercel pull` knows which project to target
      # Project ID: prj_4jtysyjAQoA8OcogAApKqbnPxClp (from Vercel project settings)
      - name: Configure Vercel project context
        run: |
          mkdir -p .vercel/project
          echo '{"projectId":"prj_4jtysyjAQoA8OcogAApKqbnPxClp","orgId":"team_placeholder"}' > .vercel/project.json
          cat .vercel/project.json

      - name: Pull Vercel Environment Information
        if: ${{ github.event.inputs.skip_pull != 'true' }}
        run: |
          echo "============================================"
          echo "STEP: Pull Vercel Environment Information"
          echo "Token present: ${{ secrets.VERCEL_TOKEN != '' }}"
          echo "============================================"

          EXIT_CODE=0
          OUTPUT=$(vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}" 2>&1) || EXIT_CODE=$?
          echo "$OUTPUT"
          echo ""
          echo "vercel pull exit code: $EXIT_CODE"

          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "============================================"
            echo "ERROR: vercel pull failed (exit $EXIT_CODE)"
            echo "============================================"

            if echo "$OUTPUT" | grep -qiE "token|unauthorized|authentication|invalid|403|401|no.*credentials|bad.*token|expired|not.*found"; then
              echo "LIKELY CAUSE: Authentication failure."
              echo "FIX: https://vercel.com/settings/tokens → create token"
              echo "     Then add to GitHub: Settings → Secrets → Actions → VERCEL_TOKEN"
            else
              echo "LIKELY CAUSE: Non-auth error. Check output above."
              echo "Common causes: project deleted, network issue, rate-limit."
            fi
            echo "============================================"
            exit $EXIT_CODE
          fi
          echo "vercel pull completed successfully"

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
