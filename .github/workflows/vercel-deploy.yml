name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Set env vars before build (NEXTAUTH_SECRET is required for Next.js build)
      # Uses GitHub secrets if available, otherwise falls back to build-safe placeholder
      - name: Set build environment variables
        run: |
          echo "NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-build-only-placeholder-$(date +%s)}" >> $GITHUB_ENV
          echo "NEXTAUTH_URL=${NEXTAUTH_URL:-https://quantan.vercel.app}" >> $GITHUB_ENV

      # Standard Next.js production build
      - name: Build Project Artifacts
        run: npm run build

      # Deploy using Vercel CLI (reads projectId from vercel.json in repo)
      - name: Install Vercel CLI
        run: npm install -g vercel@50.37.3

      - name: Deploy to Vercel
        run: vercel deploy .next --prod --token=${{ secrets.VERCEL_TOKEN }}
