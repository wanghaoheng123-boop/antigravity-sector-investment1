name: Weekly Data Refresh

on:
  schedule:
    # Sundays 22:00 UTC — after weekly market close, before Monday's pre-market
    - cron: '0 22 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Refresh backtest data from Yahoo Finance
        run: node scripts/fetchBacktestData.mjs

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Commit & push if changed
        run: |
          if git diff --quiet -- scripts/backtestData/; then
            echo "No data changes — skipping commit."
            exit 0
          fi
          git add scripts/backtestData/
          git commit -m "chore(data): weekly backtest data refresh ($(date -u +'%Y-%m-%d'))"
          git push origin HEAD:main
